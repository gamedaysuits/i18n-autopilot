# -----------------------------------------------------------------
# Sveltia CMS Configuration for i18n-rosetta Docs
# -----------------------------------------------------------------
# Auth:   GitHub Classic Personal Access Token (PAT)
# Host:   GitHub Pages (i18n-rosetta.com)
# Repo:   gamedaysuits/i18n-rosetta
# Branch: main
#
# Login:  Go to /admin → click "Sign in with GitHub" →
#         paste a Classic PAT with "repo" scope.
#
# Create a Classic PAT at:
#   https://github.com/settings/tokens/new
#   Scope: repo (full control of private repositories)
#   Note: "rosetta-cms"
# -----------------------------------------------------------------

backend:
  name: github
  repo: gamedaysuits/i18n-rosetta
  branch: main

# Where uploaded images go (relative to the repo root)
media_folder: "website/static/img/uploads"
public_folder: "/img/uploads"

# Slug formatting
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# -----------------------------------------------------------------
# Collections
# -----------------------------------------------------------------

collections:

  # ── Homepage Content ─────────────────────────────────────────────
  # Edits the landing page text (hero, stats, features, arena, etc.)
  - name: "homepage"
    label: "🏠 Homepage"
    editor:
      preview: false
    files:
      - name: "homepage-content"
        label: "Landing Page Content"
        file: "website/src/data/homepage.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { name: "title_line1", label: "Title Line 1", widget: "string" }
              - { name: "title_line2", label: "Title Line 2", widget: "string" }
              - { name: "subtitle", label: "Subtitle", widget: "text" }
              - { name: "cta_primary", label: "Primary Button", widget: "string" }
              - { name: "cta_secondary", label: "Secondary Button", widget: "string" }
          - label: "Stats Bar"
            name: "stats"
            widget: "object"
            fields:
              - { name: "tests", label: "Tests", widget: "number" }
              - { name: "dependencies", label: "Dependencies", widget: "number" }
              - { name: "script_converters", label: "Script Converters", widget: "number" }
              - { name: "language_registers", label: "Language Registers", widget: "number" }
          - label: "Feature Cards"
            name: "features"
            widget: "list"
            fields:
              - { name: "icon", label: "Icon (emoji)", widget: "string" }
              - { name: "title", label: "Title", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
          - label: "Use Cases"
            name: "use_cases"
            widget: "list"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "link_text", label: "Link Text", widget: "string" }
          - label: "Comparison Section"
            name: "comparison"
            widget: "object"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
          - label: "Arena Section"
            name: "arena"
            widget: "object"
            fields:
              - { name: "eyebrow", label: "Eyebrow Text", widget: "string" }
              - { name: "title_line1", label: "Title Line 1", widget: "string" }
              - { name: "title_line2", label: "Title Line 2", widget: "string" }
              - { name: "tagline", label: "Tagline", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "callout_line1", label: "Callout Line 1", widget: "text" }
              - { name: "callout_line2", label: "Callout Line 2", widget: "string" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { name: "icon", label: "Icon (emoji)", widget: "string" }
                  - { name: "title", label: "Title", widget: "string" }
                  - { name: "description", label: "Description", widget: "text" }
                  - { name: "link_text", label: "Link Text", widget: "string" }
          - label: "Leaderboard Widget"
            name: "leaderboard_widget"
            widget: "object"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - { name: "subtitle", label: "Subtitle", widget: "string" }
              - { name: "cta", label: "CTA Text", widget: "string" }
              - { name: "full_leaderboard_text", label: "Full Leaderboard Button", widget: "string" }
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { name: "title_suffix", label: "Page Title Suffix", widget: "string" }
              - { name: "description", label: "Meta Description", widget: "text" }

  # ── Top-level pages ──────────────────────────────────────────────
  - name: "top-level"
    label: "📄 Top-Level Pages"
    folder: "website/docs"
    create: false
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "slug", label: "Slug", widget: "string", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Getting Started ──────────────────────────────────────────────
  - name: "getting-started"
    label: "🚀 Getting Started"
    folder: "website/docs/getting-started"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Core Concepts ────────────────────────────────────────────────
  - name: "concepts"
    label: "🧠 Core Concepts"
    folder: "website/docs/concepts"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Guides ───────────────────────────────────────────────────────
  - name: "guides"
    label: "📘 Guides"
    folder: "website/docs/guides"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Tutorials ────────────────────────────────────────────────────
  - name: "tutorials"
    label: "🎓 Tutorials"
    folder: "website/docs/tutorials"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Eval / MT Research ───────────────────────────────────────────
  - name: "eval"
    label: "🧪 Eval & MT Research"
    folder: "website/docs/eval"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Reference ────────────────────────────────────────────────────
  - name: "reference"
    label: "📋 Reference"
    folder: "website/docs/reference"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Blog ─────────────────────────────────────────────────────────
  - name: "blog"
    label: "✍️ Blog Posts"
    folder: "website/blog"
    create: true
    extension: "md"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "slug", label: "Slug", widget: "string", required: false }
      - { name: "authors", label: "Authors", widget: "list", required: false }
      - { name: "tags", label: "Tags", widget: "list", required: false }
      - { name: "body", label: "Content", widget: "markdown" }
