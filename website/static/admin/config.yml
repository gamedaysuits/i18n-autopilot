# -----------------------------------------------------------------
# Sveltia CMS Configuration for i18n-rosetta Docs
# -----------------------------------------------------------------
# Auth:   GitHub Fine-grained Personal Access Token (PAT)
#         No OAuth proxy, no external services required.
# Host:   GitHub Pages (i18n-rosetta.com)
# Repo:   gamedaysuits/i18n-rosetta
# Branch: main
#
# Login:  Go to /admin → click "Sign in with GitHub" →
#         paste a Fine-grained PAT with Contents read/write
#         scope for gamedaysuits/i18n-rosetta.
#
# Create a PAT at:
#   https://github.com/settings/tokens?type=beta
#   Repository access: gamedaysuits/i18n-rosetta
#   Permissions: Contents → Read and write
# -----------------------------------------------------------------

backend:
  name: github
  repo: gamedaysuits/i18n-rosetta
  branch: main

# Where uploaded images go (relative to the repo root)
media_folder: "website/static/img/uploads"
public_folder: "/img/uploads"

# Enable editorial workflow for draft → review → publish
publish_mode: editorial_workflow

# Slug formatting
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# -----------------------------------------------------------------
# Collections — one per docs subfolder
# -----------------------------------------------------------------

collections:

  # ── Top-level pages ──────────────────────────────────────────────
  - name: "top-level"
    label: "📄 Top-Level Pages"
    folder: "website/docs"
    create: false
    extension: "md"
    filter: { field: "title" }
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Getting Started ──────────────────────────────────────────────
  - name: "getting-started"
    label: "🚀 Getting Started"
    folder: "website/docs/getting-started"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Core Concepts ────────────────────────────────────────────────
  - name: "concepts"
    label: "🧠 Core Concepts"
    folder: "website/docs/concepts"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Guides ───────────────────────────────────────────────────────
  - name: "guides"
    label: "📘 Guides"
    folder: "website/docs/guides"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Tutorials ────────────────────────────────────────────────────
  - name: "tutorials"
    label: "🎓 Tutorials"
    folder: "website/docs/tutorials"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Eval / MT Research ───────────────────────────────────────────
  - name: "eval"
    label: "🧪 Eval & MT Research"
    folder: "website/docs/eval"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Reference ────────────────────────────────────────────────────
  - name: "reference"
    label: "📋 Reference"
    folder: "website/docs/reference"
    create: true
    extension: "md"
    fields:
      - { name: "sidebar_position", label: "Sidebar Position", widget: "number", required: false }
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string", required: false }
      - { name: "body", label: "Content", widget: "markdown" }

  # ── Blog ─────────────────────────────────────────────────────────
  - name: "blog"
    label: "✍️ Blog Posts"
    folder: "website/blog"
    create: true
    extension: "md"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "slug", label: "Slug", widget: "string", required: false }
      - { name: "authors", label: "Authors", widget: "list", required: false }
      - { name: "tags", label: "Tags", widget: "list", required: false }
      - { name: "body", label: "Content", widget: "markdown" }
