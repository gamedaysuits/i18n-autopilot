<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 258" width="280" height="258">
  <!--
    i18n-rosetta — Static Logo (Matte Version)
    Three bars with R / ロ / ᕈ
    Use at: favicon, navbar, npm badge, social cards
  -->
  <defs>
    <!-- Color definitions matching the Obsidian theme -->
    <style>
      .bar-bg { fill: #16161E; }
      .char-top { fill: #6C5CE7; font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 28px; }
      .char-mid { fill: #7B8CF5; font-family: 'Noto Sans JP', system-ui, sans-serif; font-weight: 700; font-size: 28px; }
      .char-bot { fill: #00E5E6; font-family: 'Noto Sans Canadian Aboriginal', system-ui, sans-serif; font-weight: 700; font-size: 28px; }
      .border-top { stroke: rgba(108, 92, 231, 0.35); }
      .border-mid { stroke: rgba(123, 140, 245, 0.35); }
      .border-bot { stroke: rgba(0, 229, 230, 0.35); }
    </style>
  </defs>

  <!-- Bar 1: Latin R (violet) -->
  <rect class="bar-bg border-top" x="0" y="0" width="280" height="72" rx="18" ry="18"
        stroke-width="1.5" />
  <text class="char-top" x="140" y="44" text-anchor="middle" dominant-baseline="central">R</text>

  <!-- Bar 2: Katakana ロ (blue) -->
  <rect class="bar-bg border-mid" x="0" y="90" width="280" height="72" rx="18" ry="18"
        stroke-width="1.5" />
  <text class="char-mid" x="140" y="134" text-anchor="middle" dominant-baseline="central">ロ</text>

  <!-- Bar 3: Cree syllabic ᕈ (cyan) -->
  <rect class="bar-bg border-bot" x="0" y="180" width="280" height="72" rx="18" ry="18"
        stroke-width="1.5" />
  <text class="char-bot" x="140" y="224" text-anchor="middle" dominant-baseline="central">ᕈ</text>
</svg>