name: CI — i18n-rosetta

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: npm test

      # Coverage reporting — runs on Node 22 only to avoid duplicating work.
      # Uses the built-in --experimental-test-coverage flag (stable since Node 22).
      - name: Run tests with coverage
        if: matrix.node-version == 22
        run: node --test --experimental-test-coverage test/*.test.js

  # NOTE: crk-translate/ is a separate git repo (gitignored from this repo).
  # Its Python tests (sentence checker, tag encoder) live in that repo's
  # own CI at github.com/gamedaysuits/crk-translate.
  # Similarly, gds-mt-eval-harness/ is nested inside crk-translate/ with
  # its own repo at github.com/gamedaysuits/gds-mt-eval-harness.

  # Verify that translations are up to date on both doc sites.
  # Catches cases where a dev committed without the pre-commit hook active.
  i18n-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit rosetta site translations
        run: cd website && npx i18n-rosetta audit
