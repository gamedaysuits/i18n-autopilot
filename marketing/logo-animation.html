<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i18n-rosetta — Animated Logo</title>

  <!-- Inter font for the wordmark -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Noto Sans JP + Noto Sans Canadian Aboriginal for accurate script rendering -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&family=Noto+Sans+Canadian+Aboriginal:wght@700&display=swap" rel="stylesheet">

  <style>
    /* ------------------------------------------------------------------ */
    /*  Design tokens — matches the "Obsidian" theme from the docs site   */
    /* ------------------------------------------------------------------ */
    :root {
      --bg: #000000;
      --bar-bg: #16161E;

      /* Three-color gradient progression: violet → blue → cyan */
      --color-top: #6C5CE7;
      --color-mid: #7B8CF5;
      --color-bot: #00E5E6;

      /* Glow versions (slightly more saturated/bright for bloom) */
      --glow-top: #8B7BF2;
      --glow-mid: #94A3FF;
      --glow-bot: #00FFFF;

      /* Bar dimensions */
      --bar-width: 280px;
      --bar-height: 72px;
      --bar-radius: 18px;
      --bar-gap: 18px;

      /* Typography */
      --font-latin: 'Inter', system-ui, sans-serif;
      --font-jp: 'Noto Sans JP', 'Inter', sans-serif;
      --font-cree: 'Noto Sans Canadian Aboriginal', 'Inter', sans-serif;
    }

    /* ------------------------------------------------------------------ */
    /*  Reset & base                                                       */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: var(--font-latin);
    }

    /* ------------------------------------------------------------------ */
    /*  Logo container                                                     */
    /* ------------------------------------------------------------------ */
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--bar-gap);
    }

    /* ------------------------------------------------------------------ */
    /*  Individual bars                                                    */
    /* ------------------------------------------------------------------ */
    .bar {
      width: var(--bar-width);
      height: var(--bar-height);
      border-radius: var(--bar-radius);
      background: var(--bar-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      /* Start invisible and offset — JS will animate in */
      opacity: 0;
      transform: translateY(-40px);
      transition: none;
    }

    /* Color-coded subtle border for each bar */
    .bar--top { border: 1.5px solid rgba(108, 92, 231, 0.3); }
    .bar--mid { border: 1.5px solid rgba(123, 140, 245, 0.3); }
    .bar--bot { border: 1.5px solid rgba(0, 229, 230, 0.3); }

    /* ------------------------------------------------------------------ */
    /*  Glow halo — positioned behind each bar, initially hidden           */
    /*  This is the "lock-in" confirmation effect                          */
    /* ------------------------------------------------------------------ */
    .bar::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: calc(var(--bar-radius) + 4px);
      opacity: 0;
      filter: blur(16px);
      z-index: -1;
      transition: opacity 0.6s ease;
    }

    .bar--top::before { background: var(--glow-top); }
    .bar--mid::before { background: var(--glow-mid); }
    .bar--bot::before { background: var(--glow-bot); }

    /* Activated glow state — toggled by JS after lock-in */
    .bar.locked::before {
      opacity: 0.5;
      animation: glow-pulse 2s ease-in-out infinite;
    }

    /* Border brightens on lock-in too */
    .bar--top.locked { border-color: rgba(108, 92, 231, 0.7); }
    .bar--mid.locked { border-color: rgba(123, 140, 245, 0.7); }
    .bar--bot.locked { border-color: rgba(0, 229, 230, 0.7); }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 0.65; }
    }

    /* ------------------------------------------------------------------ */
    /*  Character display inside each bar                                  */
    /* ------------------------------------------------------------------ */
    .bar__char {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
      /* Start with no color — filled by JS per-bar */
      color: transparent;
      transition: color 0.15s ease;
      user-select: none;

      /* Prevent layout shift during character cycling */
      min-width: 40px;
      text-align: center;
      line-height: 1;
    }

    /* Color assignments */
    .bar--top .bar__char { color: var(--color-top); font-family: var(--font-latin); }
    .bar--mid .bar__char { color: var(--color-mid); font-family: var(--font-jp); }
    .bar--bot .bar__char { color: var(--color-bot); font-family: var(--font-cree); }

    /* During cycling: character does a quick vertical flip */
    .bar__char.flipping {
      animation: char-flip 0.12s ease-in-out;
    }

    @keyframes char-flip {
      0%   { transform: scaleY(1);   opacity: 1; }
      50%  { transform: scaleY(0);   opacity: 0.3; }
      100% { transform: scaleY(1);   opacity: 1; }
    }

    /* ------------------------------------------------------------------ */
    /*  Wordmark — fades in after lock-in                                  */
    /* ------------------------------------------------------------------ */
    .wordmark {
      margin-top: 32px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .wordmark.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .wordmark__name {
      font-family: var(--font-latin);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #E4E4F0;
      text-align: center;
    }

    .wordmark__tagline {
      font-family: var(--font-latin);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(162, 155, 254, 0.6);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="logo-container" id="logoContainer">
    <!-- Bar 1: Latin — R (for Rosetta) -->
    <div class="bar bar--top" id="barTop">
      <span class="bar__char" id="charTop">R</span>
    </div>

    <!-- Bar 2: Japanese katakana — ロ (ro, as in Rosetta) -->
    <div class="bar bar--mid" id="barMid">
      <span class="bar__char" id="charMid">ロ</span>
    </div>

    <!-- Bar 3: Cree syllabics — ᕈ -->
    <div class="bar bar--bot" id="barBot">
      <span class="bar__char" id="charBot">ᕈ</span>
    </div>

    <!-- Wordmark — appears after lock-in -->
    <div class="wordmark" id="wordmark">
      <div class="wordmark__name">i18n-rosetta</div>
      <div class="wordmark__tagline">Every language. Every method.</div>
    </div>
  </div>

  <script>
    /**
     * Logo Animation Orchestrator
     * 
     * Timeline:
     *   0.0s — Start
     *   0.3s — Bar 1 drops in from above
     *   0.6s — Bar 2 slides in from the right
     *   0.9s — Bar 3 rises in from below
     *   1.2s — All bars visible, character cycling begins
     *   1.2s–2.8s — Characters cycle through script alternatives
     *   2.8s — Characters lock to final values (R / ロ / ᕈ)
     *   3.0s — Glow halos pulse on (lock-in confirmation)
     *   3.6s — Wordmark fades in
     *   4.5s — Animation complete, logo is at rest
     *
     * Each bar cycles through characters from different writing systems
     * before settling on its final character, creating the feeling of
     * a departure board "searching" and then "finding" the right script.
     */

    // -- Characters each bar cycles through before locking --
    // Chosen to show visual diversity of writing systems
    const CYCLE_CHARS_TOP = [
      { char: 'A',  font: "'Inter', sans-serif" },
      { char: 'Я',  font: "'Inter', sans-serif" },        // Cyrillic
      { char: 'Ω',  font: "'Inter', sans-serif" },        // Greek
      { char: 'ℜ',  font: "'Inter', sans-serif" },        // Fraktur R
      { char: 'R',  font: "'Inter', sans-serif" },        // LOCK
    ];

    const CYCLE_CHARS_MID = [
      { char: 'あ', font: "'Noto Sans JP', sans-serif" },   // Hiragana
      { char: '文', font: "'Noto Sans JP', sans-serif" },   // Kanji
      { char: '가', font: "'Inter', sans-serif" },           // Hangul
      { char: 'ロ', font: "'Noto Sans JP', sans-serif" },   // LOCK
    ];

    const CYCLE_CHARS_BOT = [
      { char: 'ᐊ', font: "'Noto Sans Canadian Aboriginal', sans-serif" },
      { char: 'ᑕ', font: "'Noto Sans Canadian Aboriginal', sans-serif" },
      { char: 'ᒥ', font: "'Noto Sans Canadian Aboriginal', sans-serif" },
      { char: 'ᓀ', font: "'Noto Sans Canadian Aboriginal', sans-serif" },
      { char: 'ᕈ', font: "'Noto Sans Canadian Aboriginal', sans-serif" },   // LOCK
    ];

    // -- DOM references --
    const barTop  = document.getElementById('barTop');
    const barMid  = document.getElementById('barMid');
    const barBot  = document.getElementById('barBot');
    const charTop = document.getElementById('charTop');
    const charMid = document.getElementById('charMid');
    const charBot = document.getElementById('charBot');
    const wordmark = document.getElementById('wordmark');

    // -- Utility: animate a bar's entrance --
    function dropIn(bar, direction, delay) {
      // direction: 'top', 'right', 'bottom' determines the entry vector
      const transforms = {
        top:    'translateY(-60px)',
        right:  'translateX(80px)',
        bottom: 'translateY(60px)',
      };
      bar.style.transform = transforms[direction];
      bar.style.opacity = '0';

      setTimeout(() => {
        bar.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease';
        bar.style.transform = 'translateY(0) translateX(0)';
        bar.style.opacity = '1';
      }, delay);
    }

    /**
     * Cycle a character element through a list of characters,
     * doing a quick vertical flip (scaleY) between each change.
     * 
     * The cycle accelerates slightly — each step is faster than the last,
     * creating a "settling" / "searching" feel before lock-in.
     */
    function cycleChars(charEl, charList, startDelay, onComplete) {
      let index = 0;
      const baseInterval = 180;   // ms between first few changes
      const acceleration = 0.85;  // each step is 85% the duration of the previous

      function step() {
        if (index >= charList.length) {
          if (onComplete) onComplete();
          return;
        }

        const entry = charList[index];
        const interval = baseInterval * Math.pow(acceleration, index);

        // Trigger the flip animation
        charEl.classList.add('flipping');
        setTimeout(() => {
          charEl.textContent = entry.char;
          charEl.style.fontFamily = entry.font;
          charEl.classList.remove('flipping');
        }, 60); // Change character at the midpoint of the flip

        index++;
        setTimeout(step, Math.max(interval, 80));
      }

      setTimeout(step, startDelay);
    }

    // -- Main animation sequence --
    function runAnimation() {
      // Phase 1: Bars drop in sequentially
      dropIn(barTop, 'top',    300);
      dropIn(barMid, 'right',  600);
      dropIn(barBot, 'bottom', 900);

      // Phase 2: Character cycling begins once all bars are in
      // Stagger the cycling starts so they don't move in unison
      const cycleStart = 1300;

      let locked = 0;
      function checkAllLocked() {
        locked++;
        if (locked === 3) {
          // Phase 3: All characters locked — activate glow halos
          setTimeout(() => {
            barTop.classList.add('locked');
          }, 100);
          setTimeout(() => {
            barMid.classList.add('locked');
          }, 250);
          setTimeout(() => {
            barBot.classList.add('locked');
          }, 400);

          // Phase 4: Wordmark fades in
          setTimeout(() => {
            wordmark.classList.add('visible');
          }, 800);
        }
      }

      cycleChars(charTop, CYCLE_CHARS_TOP, cycleStart,       checkAllLocked);
      cycleChars(charMid, CYCLE_CHARS_MID, cycleStart + 100, checkAllLocked);
      cycleChars(charBot, CYCLE_CHARS_BOT, cycleStart + 200, checkAllLocked);
    }

    // Kick off on load (with a small initial delay for font loading)
    window.addEventListener('load', () => {
      setTimeout(runAnimation, 500);
    });
  </script>
</body>
</html>
